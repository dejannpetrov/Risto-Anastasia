<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risto & Anastasia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Playfair Display', serif;
    background: #000;
    color: white;
    overflow: hidden;
}

.container {
    position: relative;
    height: 100vh;
    width: 100%;
}

/* COVER IMAGE */
.cover {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    filter: brightness(0.7);
}

/* OVERLAY CONTENT */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    padding: 20px;
}

/* TEXT */
.names {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    margin-bottom: 10px;
}

.date {
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

/* BUTTON */
button {
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.9);
    color: black;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(5px);
    transition: 0.3s;
}

button:hover {
    background: white;
}

/* PARTICLES */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* RESPONSIVE */
@media (max-width: 430px) {
    .names {
        font-size: 34px;
    }
    .date {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="container">
    <!-- CHANGE IMAGE HERE -->
    <img src="1-1129.jpg" class="cover">

    <canvas id="particles"></canvas>

    <div class="overlay">
        <div class="names">Risto & Anastasia</div>
        <div class="date">August 03, 2024</div>

        <button id="musicBtn">Play Music</button>
    </div>
</div>

<!-- CHANGE SONG HERE -->
<audio id="music" src="song.mp3"></audio>

<script>
const btn = document.getElementById("musicBtn");
const music = document.getElementById("music");
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let playing = false;

/* CREATE PARTICLES */
function createParticles() {
    particles = [];
    for (let i = 0; i < 80; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: canvas.height + Math.random() * 200,
            size: Math.random() * 2,
            speed: Math.random() * 1 + 0.5
        });
    }
}

/* DRAW */
function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    particles.forEach(p => {
        if (playing) {
            p.y -= p.speed;
            if (p.y < 0) {
                p.y = canvas.height;
                p.x = Math.random() * canvas.width;
            }
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(drawParticles);
}

createParticles();
drawParticles();

/* BUTTON LOGIC */
btn.addEventListener("click", () => {
    if (!playing) {
        music.play();
        playing = true;
        btn.textContent = "Stop Music";
    } else {
        music.pause();
        playing = false;
        btn.textContent = "Play Music";
    }
});

/* RESIZE FIX */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    createParticles();
});
</script>

</body>
</html>
